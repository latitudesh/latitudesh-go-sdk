# golangci-lint configuration for integration tests
version: "2"

run:
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - unconvert
    - unparam
    - gocritic
    - gosec
  settings:
    govet:
      enable-all: true
    errcheck:
      check-type-assertions: true
      check-blank: false
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - commentFormatting
        - whyNoLint
    gosec:
      excludes:
        - G404 # Use of weak random number generator (acceptable in tests)
  exclusions:
    rules:
      # Exclude some linters from running on tests files
      - path: _test\.go
        linters:
          - gosec
          - errcheck
    paths:
      - vendor

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/latitudesh/latitudesh-go-sdk

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
